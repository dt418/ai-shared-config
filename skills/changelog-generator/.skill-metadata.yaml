examples:
  - id: weekly-changelog
    title:
      zh: 生成周度更新日志
      en: Generate Weekly Changelog
    description:
      zh: 为本周的所有提交生成用户友好的更新日志
      en: Generate user-friendly changelog for all commits from this week
    prompt:
      zh: |-
        请为我的项目生成本周的更新日志。

        项目信息：
        - 项目名称：[项目名称]
        - 仓库地址：[Git仓库URL]

        请：
        1. 分析本周的所有Git提交
        2. 按功能、改进、修复等类别分类
        3. 将技术性提交转换为用户友好的语言
        4. 生成结构化的更新日志

        输出格式示例：
        # [项目名称] 周度更新 - [日期范围]

        ## ✨ 新功能
        - [功能描述]

        ## 🔧 改进
        - [改进描述]

        ## 🐛 修复
        - [修复描述]
      en: |-
        Please generate a weekly changelog for my project.

        Project information:
        - Project name: [Project Name]
        - Repository URL: [Git Repository URL]

        Please:
        1. Analyze all Git commits from this week
        2. Categorize by features, improvements, fixes, etc.
        3. Translate technical commits into user-friendly language
        4. Generate structured changelog

        Output format example:
        # [Project Name] Weekly Update - [Date Range]

        ## ✨ New Features
        - [Feature description]

        ## 🔧 Improvements
        - [Improvement description]

        ## 🐛 Fixes
        - [Fix description]
  - id: version-release
    title:
      zh: 生成版本发布日志
      en: Generate Version Release Notes
    description:
      zh: 为特定版本生成详细的发布说明
      en: Generate detailed release notes for a specific version
    prompt:
      zh: |-
        请为我的项目v2.5.0版本生成发布日志。

        项目背景：
        - 上个版本：v2.4.0
        - 主要变化：[简要描述主要更新]

        要求：
        1. 对比v2.4.0到v2.5.0的所有重要提交
        2. 突出新功能和重大改进
        3. 包含破坏性变更提醒
        4. 使用适合用户的语言风格

        特别注意：
        - 如果有API变更，请明确标注
        - 如有迁移指南需求，请提供简要说明
      en: |-
        Please generate release notes for version v2.5.0 of my project.

        Project background:
        - Previous version: v2.4.0
        - Major changes: [Brief description of major updates]

        Requirements:
        1. Compare all important commits from v2.4.0 to v2.5.0
        2. Highlight new features and major improvements
        3. Include breaking changes warnings
        4. Use user-appropriate language style

        Special attention:
        - If there are API changes, please mark them clearly
        - If migration guide is needed, provide brief instructions
  - id: custom-range
    title:
      zh: 自定义时间范围日志
      en: Custom Date Range Changelog
    description:
      zh: 为指定日期范围生成更新日志
      en: Generate changelog for a custom date range
    prompt:
      zh: |-
        请为我的项目生成2024年3月1日至3月15日的更新日志。

        具体要求：
        - 时间范围：2024-03-01 到 2024-03-15
        - 重点关注：性能优化和bug修复
        - 输出格式：Markdown

        请帮我：
        1. 筛选出这个时间段的重要提交
        2. 按优先级排序变更内容
        3. 生成简洁明了的更新说明
        4. 突出对用户最有价值的改进
      en: |-
        Please generate a changelog for my project from March 1, 2024 to March 15, 2024.

        Specific requirements:
        - Time range: 2024-03-01 to 2024-03-15
        - Focus on: Performance optimizations and bug fixes
        - Output format: Markdown

        Please help me:
        1. Filter important commits from this time period
        2. Sort changes by priority
        3. Generate concise and clear update descriptions
        4. Highlight the most valuable improvements for users
  - id: app-store
    title:
      zh: 应用商店更新描述
      en: App Store Update Description
    description:
      zh: 生成适合应用商店的应用更新描述
      en: Generate app store suitable update descriptions
    prompt:
      zh: |-
        请为我的移动应用生成App Store更新描述。

        应用信息：
        - 应用名称：[应用名称]
        - 当前版本：2.5.0
        - 目标用户：普通消费者

        要求：
        1. 语言简洁生动，吸引用户更新
        2. 突出1-3个最重要的新功能
        3. 避免过多技术术语
        4. 字数控制在200字以内

        请生成既专业又亲民的更新描述。
      en: |-
        Please generate an App Store update description for my mobile app.

        App information:
        - App name: [App Name]
        - Current version: 2.5.0
        - Target users: General consumers

        Requirements:
        1. Concise and engaging language to encourage users to update
        2. Highlight 1-3 most important new features
        3. Avoid excessive technical terminology
        4. Keep within 200 words

        Please generate an update description that is both professional and approachable.
